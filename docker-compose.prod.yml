services:
  api:
    image: ghcr.io/trancong12102/omnivoice-api:latest
    container_name: omnivoice-api
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      OMNIVOICE_WARMUP_ON_STARTUP: "true"
      HF_HOME: /root/.cache/huggingface
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: omnivoice-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - .env.prod
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  hf_cache:
