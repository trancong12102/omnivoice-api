[workspace]
name = "omnivoice-api"
version = "0.1.0"
description = "HTTP API wrapping k2-fsa/OmniVoice zero-shot TTS"
authors = ["cong.tran <cong.tran@jmango360.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
serve = "uvicorn omnivoice_api.main:app --host 0.0.0.0 --port 8000 --reload"
serve-prod = "uvicorn omnivoice_api.main:app --host 0.0.0.0 --port 8000 --workers 1"
download-model = "python -m omnivoice_api.scripts.download_model"
info = "python -c 'from omnivoice_api.device import describe; describe()'"
minio-up = "docker compose up -d minio createbucket"
minio-down = "docker compose down"
minio-logs = "docker compose logs -f minio"
test = "pytest tests -v -s"
test-e2e = "pytest tests/test_e2e_clone.py -v -s"

[dependencies]
python = "3.13.*"
pip = "*"
ffmpeg = "*"
libsndfile = "*"

[pypi-dependencies]
omnivoice = "==0.1.4"
transformers = ">=5.3.0,<6"
accelerate = "*"
numpy = "*"
soundfile = "*"
librosa = "*"
pydub-ng = ">=0.2.0"
fastapi = "*"
uvicorn = { version = "*", extras = ["standard"] }
pydantic = ">=2"
pydantic-settings = "*"
python-multipart = "*"
huggingface-hub = "*"
boto3 = "*"
botocore = "*"
omnivoice-api = { path = ".", editable = true }

# ---------- dev feature: macOS (Apple Silicon), CPU/MPS ----------
[feature.dev]
platforms = ["osx-arm64"]

[feature.dev.pypi-dependencies]
torch = "==2.11.0"
torchaudio = "==2.11.0"

# ---------- test feature: e2e test deps ----------
[feature.test.pypi-dependencies]
pytest = "*"
httpx = "*"

# ---------- prod feature: Linux (WSL2) + CUDA 12.8 ----------
[feature.prod]
platforms = ["linux-64"]

[feature.prod.system-requirements]
cuda = "12"

[feature.prod.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]

[feature.prod.pypi-dependencies]
torch = "==2.11.0"
torchaudio = "==2.11.0"

[environments]
default = { features = ["dev", "test"], solve-group = "dev" }
prod = { features = ["prod", "test"], solve-group = "prod" }
